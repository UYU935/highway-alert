name: Highway Closure Agent

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check-highway:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Debug webhook URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.HIGHWAY_DISCORD_WEBHOOK_URL }}
        run: |
          echo "URL length: ${#DISCORD_WEBHOOK_URL}"
          echo "URL prefix: ${DISCORD_WEBHOOK_URL:0:50}"

      - name: Test webhook with curl
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.HIGHWAY_DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -o /tmp/discord_resp.txt -w "HTTP_STATUS:%{http_code}" \
            -H "Content-Type: application/json" \
            -d '{"content":"test"}' \
            "$DISCORD_WEBHOOK_URL" | tee /tmp/curl_result.txt
          echo ""
          cat /tmp/discord_resp.txt

      - name: Run highway closure check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.HIGHWAY_DISCORD_WEBHOOK_URL }}
          STATE_FILE: agents/highway/state_highway.json
        run: python agents/highway/check_highway.py

      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/highway/state_highway.json
          git diff --staged --quiet || git commit -m "chore: update highway state [skip ci]"
          git push
