name: Highway Closure Agent

on:
  schedule:
    # 30分おきに実行（UTC）
    - cron: "*/30 * * * *"
  workflow_dispatch: # 手動実行（テスト用）

jobs:
  check-highway:
    runs-on: ubuntu-latest
    permissions:
      contents: write # state_highway.json をコミットするため

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Debug webhook URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.HIGHWAY_DISCORD_WEBHOOK_URL }}
        run: |
          python -c "
import os
url = os.environ.get('DISCORD_WEBHOOK_URL', '')
print(f'URL length: {len(url)}')
print(f'URL prefix: {url[:40]}...' if len(url) > 40 else f'URL: {repr(url)}')
"

      - name: Run highway closure check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.HIGHWAY_DISCORD_WEBHOOK_URL }}
          STATE_FILE: agents/highway/state_highway.json
        run: python agents/highway/check_highway.py

      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/highway/state_highway.json
          git diff --staged --quiet || git commit -m "chore: update highway state [skip ci]"
          git push
